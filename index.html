<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ninas ord</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', system-ui, sans-serif;
    background: linear-gradient(135deg, #ffe0ec 0%, #ffc0da 45%, #ff99c8 100%);
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  #game {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #header {
    padding: 12px 20px 0;
    text-align: center;
  }

  h1 {
    color: #c71585;
    font-size: clamp(24px, 4vw, 40px);
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(199, 21, 133, 0.2);
    letter-spacing: 2px;
  }

  #word {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: clamp(6px, 1.5vw, 14px);
    padding: 20px 20px 10px;
    min-height: 120px;
  }

  .word-letter {
    font-size: clamp(54px, 11vw, 110px);
    font-weight: 900;
    color: transparent;
    -webkit-text-stroke: 3px #e0a5be;
    transition: -webkit-text-stroke-color 0.3s ease, color 0.3s ease;
    line-height: 1;
  }

  .word-letter.filled {
    animation: pop 0.5s cubic-bezier(.34,1.56,.64,1);
  }

  @keyframes pop {
    0%   { transform: scale(1) rotate(0); }
    40%  { transform: scale(1.5) rotate(-8deg); }
    70%  { transform: scale(0.9) rotate(4deg); }
    100% { transform: scale(1) rotate(0); }
  }

  #playarea {
    flex: 1;
    position: relative;
    margin: 10px 16px 16px;
    background:
      linear-gradient(rgba(255, 224, 236, 0.55), rgba(255, 153, 200, 0.55)),
      url('https://images.stilla.ai/1h9eA3JhzEz1qFJMXw6JhggomVaIQCbgiGSGtgwogfc/s:2048/plain/gs://stilla-org-files/org_01kb2c7sf1fb58kaawx949mrv8/files/file_01kpjac6v7fhfawb1s8zt2cs0t.png') center/cover no-repeat,
      rgba(255, 255, 255, 0.35);
    border: 3px dashed rgba(255, 105, 180, 0.35);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: inset 0 0 40px rgba(255, 182, 193, 0.5);
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36' viewBox='0 0 36 36'><path d='M18 3 L22 14 L33 14 L24 21 L28 32 L18 25 L8 32 L12 21 L3 14 L14 14 Z' fill='%23ff1493' stroke='%23fff' stroke-width='2' stroke-linejoin='round'/></svg>") 18 18, auto;
  }

  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 24px;
    line-height: 1;
    z-index: 40;
    animation: sparkle-out 0.9s ease-out forwards;
    text-shadow: 0 0 8px currentColor, 0 0 2px #fff;
    will-change: transform, opacity;
  }

  #neon-cursor {
    position: fixed;
    left: 0; top: 0;
    pointer-events: none;
    z-index: 1000;
    font-size: 48px;
    line-height: 1;
    color: #ff10a0;
    text-shadow:
      0 0 6px #ff10a0,
      0 0 14px #ff4dc4,
      0 0 24px #ff69b4,
      0 0 2px #fff;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    transition: opacity 0.12s ease;
    will-change: transform, left, top;
  }

  #neon-cursor.visible {
    opacity: 1;
    animation: cursor-pulse 0.55s ease-in-out infinite;
  }

  @keyframes cursor-pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50%      { transform: translate(-50%, -50%) scale(1.45); }
  }

  @keyframes sparkle-out {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.2) rotate(0); }
    25%  { opacity: 1; transform: translate(-50%, -50%) scale(1.3) rotate(120deg); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(240deg); }
  }

  .letter {
    position: absolute;
    width: clamp(92px, 16.25vw, 130px);
    height: clamp(92px, 16.25vw, 130px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(48px, 8.75vw, 72px);
    font-weight: 900;
    color: white;
    cursor: none;
    box-shadow:
      inset 0 -6px 0 rgba(0,0,0,0.18),
      inset 0 4px 0 rgba(255,255,255,0.35),
      0 6px 18px rgba(0,0,0,0.2);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    transition: transform 0.12s ease;
    will-change: transform, left, top;
  }

  .letter:hover { transform: scale(1.12); }
  .letter:active { transform: scale(0.92); }

  .letter.wrong { animation: shake 0.45s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-12px) rotate(-6deg); }
    40%, 80% { transform: translateX(12px) rotate(6deg); }
  }

  .letter.disappear {
    animation: burst-pop 0.45s cubic-bezier(.4, 1.6, .6, 1) forwards;
    pointer-events: none;
  }
  @keyframes burst-pop {
    0%   { transform: scale(1) rotate(0); opacity: 1; filter: brightness(1); }
    35%  { transform: scale(1.55) rotate(10deg); opacity: 1; filter: brightness(1.6); }
    100% { transform: scale(0) rotate(420deg); opacity: 0; filter: brightness(2); }
  }

  .burst {
    position: absolute;
    pointer-events: none;
    font-size: 26px;
    line-height: 1;
    z-index: 45;
    text-shadow: 0 0 10px currentColor, 0 0 2px #fff;
    will-change: transform, opacity;
  }

  .shockwave {
    position: absolute;
    pointer-events: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 4px solid currentColor;
    transform: translate(-50%, -50%);
    z-index: 44;
    animation: shockwave 0.55s ease-out forwards;
    will-change: transform, opacity;
  }
  @keyframes shockwave {
    0%   { width: 20px;  height: 20px;  opacity: 0.9; border-width: 5px; }
    100% { width: 220px; height: 220px; opacity: 0;   border-width: 1px; }
  }

  #celebrate {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: clamp(52px, 11vw, 120px);
    font-weight: 900;
    opacity: 0;
    pointer-events: none;
    z-index: 120;
    white-space: nowrap;
    text-align: center;
    letter-spacing: 2px;
  }

  #celebrate span {
    display: inline-block;
    background: linear-gradient(90deg,
      #ff1493, #ff7043, #ffd700, #4caf50, #29b6f6, #9c27b0, #ff1493);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: rainbow-shift 1.1s linear infinite;
    filter:
      drop-shadow(2px 2px 0 #fff)
      drop-shadow(-2px -2px 0 #fff)
      drop-shadow(4px 4px 0 rgba(199, 21, 133, 0.35))
      drop-shadow(0 0 24px rgba(255, 105, 180, 0.9));
  }

  @keyframes rainbow-shift {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  #celebrate.show { animation: celebrate 3.4s cubic-bezier(.34, 1.56, .64, 1) forwards; }
  @keyframes celebrate {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0)    rotate(-40deg); }
    10%  { opacity: 1; transform: translate(-50%, -50%) scale(1.8)  rotate(12deg); }
    20%  { transform: translate(-50%, -50%) scale(1.1)  rotate(-6deg); }
    30%  { transform: translate(-50%, -50%) scale(1.55) rotate(5deg); }
    42%  { transform: translate(-50%, -50%) scale(1.25) rotate(-3deg); }
    56%  { transform: translate(-50%, -50%) scale(1.5)  rotate(2deg); }
    72%  { transform: translate(-50%, -50%) scale(1.3)  rotate(-1deg); }
    88%  { opacity: 1; transform: translate(-50%, -50%) scale(1.45); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(2.3); }
  }

  .firework-flash {
    position: absolute;
    pointer-events: none;
    width: 24px; height: 24px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 55;
    animation: firework-flash 0.55s ease-out forwards;
    box-shadow: 0 0 60px currentColor, 0 0 120px currentColor;
  }
  @keyframes firework-flash {
    0%   { width: 30px;  height: 30px;  opacity: 1; filter: brightness(3); }
    100% { width: 260px; height: 260px; opacity: 0; filter: brightness(4); }
  }

  .firework-ring {
    position: absolute;
    pointer-events: none;
    width: 20px; height: 20px;
    border: 5px solid currentColor;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 54;
    animation: firework-ring 0.75s ease-out forwards;
  }
  @keyframes firework-ring {
    0%   { width: 20px;  height: 20px;  opacity: 1; border-width: 6px; }
    100% { width: 340px; height: 340px; opacity: 0; border-width: 1px; }
  }

  .firework-particle {
    position: absolute;
    pointer-events: none;
    font-size: 30px;
    line-height: 1;
    z-index: 55;
    text-shadow: 0 0 10px currentColor, 0 0 2px #fff;
    will-change: transform, opacity;
  }

  .falling-sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 34px;
    line-height: 1;
    z-index: 53;
    text-shadow: 0 0 10px currentColor, 0 0 2px #fff;
    will-change: transform, opacity;
  }

  #playarea.celebrating {
    animation: playarea-pulse 0.7s ease-in-out 4;
  }
  @keyframes playarea-pulse {
    0%, 100% {
      box-shadow: inset 0 0 40px rgba(255, 182, 193, 0.5);
      border-color: rgba(255, 105, 180, 0.35);
    }
    50% {
      box-shadow:
        inset 0 0 120px rgba(255, 20, 147, 0.9),
        0 0 60px rgba(255, 20, 147, 0.7);
      border-color: rgba(255, 20, 147, 1);
    }
  }

  .word-letter.dancing {
    animation: letter-dance 0.75s cubic-bezier(.34, 1.56, .64, 1) 3 !important;
  }
  @keyframes letter-dance {
    0%, 100% { transform: translateY(0) rotate(0) scale(1); }
    20%      { transform: translateY(-30px) rotate(-12deg) scale(1.15); }
    60%      { transform: translateY(-14px) rotate(10deg)  scale(1.05); }
  }
</style>
</head>
<body>
<div id="game">
  <div id="header"><h1>🌸 <span id="title-label">Ninas</span> ord 🌸</h1></div>
  <div id="word"></div>
  <div id="playarea">
    <div id="celebrate"><span>⭐ BRA JOBBAT! ⭐</span></div>
  </div>
  <div id="neon-cursor">★</div>
</div>

<script>
const WORDS = [
  // nature & weather
  'SOL','MÅNE','STJÄRNA','HAV','SNÖ','IS','REGN','VIND','MOLN','ELD',
  'SAND','JORD','BERG','SJÖ','STEN','TRÄD','BLAD','GRÄS','BLOMMA',
  // colors (all basic)
  'RÖD','GUL','BLÅ','GRÖN','VIT','SVART','ROSA','LILA','BRUN','ORANGE','GRÅ',
  // animals
  'KATT','HUND','KO','GRIS','HÄST','FÅR','GET','RÄV','ÄLG','ANKA',
  'MUS','APA','ORM','BI','MYRA','FISK','BJÖRN','VARG','KANIN','FÅGEL',
  'HÖNA','UGGLA','GRODA','FJÄRIL','VAL','HAJ','LEJON','TIGER','ELEFANT','PINGVIN',
  // body
  'ÖGA','ÖRA','MUN','NÄSA','HAND','FOT','ARM','BEN','HÅR','TAND',
  // family & people
  'MAMMA','PAPPA','BARN','MOR','FAR','VÄN','BROR','FARMOR','MORMOR','NINA',
  // food
  'ÄPPLE','BANAN','MJÖLK','BRÖD','OST','KAKA','GLASS','VATTEN','SMÖR','SALT',
  'KORV','GODIS',
  // objects
  'BIL','BOK','SKO','BOLL','HUS','BORD','STOL','SÄNG','DÖRR','LAMPA',
  'KLOCKA','NALLE','DOCKA','PENNA','TÅG',
  // clothes
  'MÖSSA','TRÖJA','SOCKA'
];

const COLORS = [
  // pinks & magentas (keep the theme happy)
  '#ff1493', '#ff69b4', '#ff4081', '#e91e63', '#f06292',
  '#ff6b9d', '#ff8fab', '#ff5a8c', '#db7093', '#ff3d7f',
  // purples & violets
  '#c71585', '#9c27b0', '#ba68c8', '#ab47bc', '#7e57c2',
  '#673ab7', '#5e35b1', '#8e24aa',
  // reds & oranges
  '#f44336', '#e53935', '#ff5722', '#ff6347', '#ff7043',
  '#ff8c00', '#ffa726',
  // yellows
  '#ffc107', '#ffca28', '#ffd54f', '#fdd835',
  // greens
  '#8bc34a', '#66bb6a', '#4caf50', '#43a047', '#26a69a',
  // cyans & blues
  '#00bcd4', '#29b6f6', '#03a9f4', '#2196f3', '#1e88e5',
  '#3f51b5', '#5c6bc0',
  // browns (for a grounded contrast)
  '#8d6e63', '#a1887f'
];

const SPARKLE_CHARS = ['✦', '★', '✧', '♥', '✿'];

let currentWord = '';
let progress = 0;
let letters = [];
let animationId = null;
let lastWord = '';
let busy = false;

const pick = arr => arr[Math.floor(Math.random() * arr.length)];

function pickWord() {
  let w;
  do { w = pick(WORDS); } while (w === lastWord && WORDS.length > 1);
  lastWord = w;
  return w;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function loadWord() {
  if (animationId) cancelAnimationFrame(animationId);
  busy = false;

  currentWord = pickWord();
  progress = 0;
  letters = [];

  const wordEl = document.getElementById('word');
  wordEl.innerHTML = '';
  for (const ch of currentWord) {
    const span = document.createElement('span');
    span.className = 'word-letter';
    span.textContent = ch;
    wordEl.appendChild(span);
  }

  const playarea = document.getElementById('playarea');
  playarea.querySelectorAll('.letter').forEach(el => el.remove());

  const chars = shuffle(currentWord.split(''));
  const rect = playarea.getBoundingClientRect();
  const size = Math.min(130, Math.max(92, window.innerWidth * 0.1625));
  const margin = 10;

  chars.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'letter';
    el.textContent = ch;
    const color = pick(COLORS);
    el.style.background = `radial-gradient(circle at 35% 30%, #fff6, ${color} 60%, ${shade(color, -25)})`;

    const letter = {
      el, char: ch, color, size,
      x: margin + Math.random() * Math.max(1, rect.width - size - margin * 2),
      y: margin + Math.random() * Math.max(1, rect.height - size - margin * 2),
      vx: (Math.random() < 0.5 ? -1 : 1) * (0.15 + Math.random() * 0.3),
      vy: (Math.random() < 0.5 ? -1 : 1) * (0.15 + Math.random() * 0.3),
      disappeared: false,
    };

    el.style.left = letter.x + 'px';
    el.style.top  = letter.y + 'px';

    const handler = (e) => { e.preventDefault(); clickLetter(letter); };
    el.addEventListener('click', handler);
    playarea.appendChild(el);
    letters.push(letter);
  });

  animate();
}

function shade(hex, percent) {
  const num = parseInt(hex.slice(1), 16);
  const amt = Math.round(2.55 * percent);
  const r = Math.max(0, Math.min(255, (num >> 16) + amt));
  const g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + amt));
  const b = Math.max(0, Math.min(255, (num & 0xff) + amt));
  return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
}

function clickLetter(letter) {
  if (busy || letter.disappeared) return;
  const expected = currentWord[progress];

  if (letter.char === expected) {
    const wordEl = document.getElementById('word');
    const target = wordEl.children[progress];
    target.style.color = letter.color;
    target.style.webkitTextStroke = `3px ${shade(letter.color, -15)}`;
    target.classList.add('filled');

    letter.el.classList.add('disappear');
    letter.disappeared = true;
    burstLetter(letter);
    document.getElementById('neon-cursor').classList.remove('visible');
    progress++;

    if (progress === currentWord.length) {
      busy = true;
      setTimeout(celebrate, 400);
    }
  } else {
    letter.el.classList.add('wrong');
    setTimeout(() => letter.el.classList.remove('wrong'), 450);
  }
}

const FIREWORK_CHARS = ['✦','★','✧','♥','✿','◆','✺'];

function celebrate() {
  const celebrateEl = document.getElementById('celebrate');
  celebrateEl.classList.remove('show');
  void celebrateEl.offsetWidth;
  celebrateEl.classList.add('show');

  const playarea = document.getElementById('playarea');
  playarea.classList.add('celebrating');

  // dance the finished word letters
  const wordLetters = document.querySelectorAll('.word-letter');
  wordLetters.forEach((el, i) => {
    el.style.animationDelay = (i * 70) + 'ms';
    el.classList.add('dancing');
  });

  // cascade of fireworks across the play area
  const origins = [
    [0.5, 0.5,    0],
    [0.2, 0.3,  180],
    [0.8, 0.3,  360],
    [0.25, 0.75, 540],
    [0.75, 0.75, 720],
    [0.5, 0.2,  900],
    [0.15, 0.5, 1080],
    [0.85, 0.5, 1260],
    [0.4, 0.6,  1440],
    [0.6, 0.35, 1620],
    [0.3, 0.45, 1800],
    [0.7, 0.55, 1980],
    [0.5, 0.85, 2160]
  ];
  origins.forEach(([x, y, delay]) => setTimeout(() => firework(x, y), delay));

  // continuous falling sparkle rain
  let fallCount = 0;
  const fallTimer = setInterval(() => {
    fallingSparkle();
    if (++fallCount > 50) clearInterval(fallTimer);
  }, 55);

  setTimeout(() => {
    playarea.classList.remove('celebrating');
    wordLetters.forEach(el => {
      el.classList.remove('dancing');
      el.style.animationDelay = '';
    });
    loadWord();
  }, 3600);
}

function firework(relX, relY) {
  const playarea = document.getElementById('playarea');
  const rect = playarea.getBoundingClientRect();
  const cx = relX * rect.width;
  const cy = relY * rect.height;
  const themeColor = pick(COLORS);

  const flash = document.createElement('div');
  flash.className = 'firework-flash';
  flash.style.left = cx + 'px';
  flash.style.top  = cy + 'px';
  flash.style.background = themeColor;
  flash.style.color = themeColor;
  playarea.appendChild(flash);
  setTimeout(() => flash.remove(), 650);

  const ring = document.createElement('div');
  ring.className = 'firework-ring';
  ring.style.left = cx + 'px';
  ring.style.top  = cy + 'px';
  ring.style.color = themeColor;
  playarea.appendChild(ring);
  setTimeout(() => ring.remove(), 850);

  const n = 22;
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'firework-particle';
    p.textContent = pick(FIREWORK_CHARS);
    p.style.color = pick(COLORS);
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    playarea.appendChild(p);
    const angle = (i / n) * Math.PI * 2 + Math.random() * 0.18;
    const speed = 130 + Math.random() * 220;
    const dx = Math.cos(angle) * speed;
    const dy = Math.sin(angle) * speed;
    const gravity = 80 + Math.random() * 60;
    p.animate([
      { transform: 'translate(-50%, -50%) scale(0.3) rotate(0)', opacity: 1 },
      { transform: `translate(calc(-50% + ${dx * 0.7}px), calc(-50% + ${dy * 0.7}px)) scale(1.4) rotate(${Math.random() * 360}deg)`, opacity: 1, offset: 0.3 },
      { transform: `translate(calc(-50% + ${dx * 1.3}px), calc(-50% + ${dy * 1.3 + gravity}px)) scale(0.4) rotate(${Math.random() * 540}deg)`, opacity: 0 }
    ], { duration: 1400 + Math.random() * 400, easing: 'cubic-bezier(.2,.7,.4,1)' });
    setTimeout(() => p.remove(), 1900);
  }
}

function fallingSparkle() {
  const playarea = document.getElementById('playarea');
  const rect = playarea.getBoundingClientRect();
  const s = document.createElement('div');
  s.className = 'falling-sparkle';
  s.textContent = pick(FIREWORK_CHARS.concat(['⭐']));
  s.style.color = pick(COLORS);
  s.style.left = (Math.random() * rect.width) + 'px';
  s.style.top  = '-40px';
  playarea.appendChild(s);
  const drift = (Math.random() - 0.5) * 120;
  s.animate([
    { transform: 'translate(0, 0) rotate(0)', opacity: 0 },
    { transform: `translate(${drift * 0.3}px, ${rect.height * 0.3}px) rotate(${Math.random() * 200}deg)`, opacity: 1, offset: 0.15 },
    { transform: `translate(${drift}px, ${rect.height + 80}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
  ], { duration: 1800 + Math.random() * 800, easing: 'cubic-bezier(.3,.1,.7,.9)' });
  setTimeout(() => s.remove(), 2900);
}

function animate() {
  const playarea = document.getElementById('playarea');
  const rect = playarea.getBoundingClientRect();

  for (const l of letters) {
    if (l.disappeared) continue;
    l.x += l.vx;
    l.y += l.vy;

    if (l.x < 0)               { l.x = 0; l.vx = Math.abs(l.vx); }
    if (l.x > rect.width - l.size)  { l.x = rect.width - l.size; l.vx = -Math.abs(l.vx); }
    if (l.y < 0)               { l.y = 0; l.vy = Math.abs(l.vy); }
    if (l.y > rect.height - l.size) { l.y = rect.height - l.size; l.vy = -Math.abs(l.vy); }

    l.el.style.left = l.x + 'px';
    l.el.style.top  = l.y + 'px';
  }

  // gentle bump between letters so they don't overlap too much
  for (let i = 0; i < letters.length; i++) {
    const a = letters[i];
    if (a.disappeared) continue;
    for (let j = i + 1; j < letters.length; j++) {
      const b = letters[j];
      if (b.disappeared) continue;
      const dx = (a.x + a.size / 2) - (b.x + b.size / 2);
      const dy = (a.y + a.size / 2) - (b.y + b.size / 2);
      const d = Math.hypot(dx, dy);
      const min = a.size * 0.9;
      if (d > 0 && d < min) {
        const push = (min - d) / 2;
        const nx = dx / d, ny = dy / d;
        a.x += nx * push; a.y += ny * push;
        b.x -= nx * push; b.y -= ny * push;
        a.vx = nx * Math.abs(a.vx || 1);
        a.vy = ny * Math.abs(a.vy || 1);
        b.vx = -nx * Math.abs(b.vx || 1);
        b.vy = -ny * Math.abs(b.vy || 1);
      }
    }
  }

  animationId = requestAnimationFrame(animate);
}

window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const label = params.get('label') || 'Ninas';
  const titleLabel = document.getElementById('title-label');
  titleLabel.textContent = label;
  document.title = `${label} ord`;

  loadWord();
  const playarea = document.getElementById('playarea');
  const neon = document.getElementById('neon-cursor');

  let lastSparkle = 0;
  playarea.addEventListener('pointermove', e => {
    const now = performance.now();
    if (now - lastSparkle < 45) return;
    lastSparkle = now;
    const rect = playarea.getBoundingClientRect();
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = pick(SPARKLE_CHARS);
    s.style.color = pick(COLORS);
    s.style.left = (e.clientX - rect.left + (Math.random() - 0.5) * 10) + 'px';
    s.style.top  = (e.clientY - rect.top  + (Math.random() - 0.5) * 10) + 'px';
    playarea.appendChild(s);
    setTimeout(() => s.remove(), 900);
  });

  document.addEventListener('pointermove', e => {
    neon.style.left = e.clientX + 'px';
    neon.style.top  = e.clientY + 'px';
  });

  playarea.addEventListener('pointerover', e => {
    if (e.target.classList && e.target.classList.contains('letter')) {
      neon.classList.add('visible');
    }
  });
  playarea.addEventListener('pointerout', e => {
    if (e.target.classList && e.target.classList.contains('letter')) {
      neon.classList.remove('visible');
    }
  });
});

function burstLetter(letter) {
  const playarea = document.getElementById('playarea');
  const cx = letter.x + letter.size / 2;
  const cy = letter.y + letter.size / 2;
  const count = 14;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'burst';
    p.textContent = pick(SPARKLE_CHARS);
    p.style.color = letter.color;
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    playarea.appendChild(p);
    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.3;
    const dist = 60 + Math.random() * letter.size * 1.3;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    p.animate([
      { transform: 'translate(-50%, -50%) scale(0.3) rotate(0)', opacity: 1 },
      { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(1.4) rotate(${Math.random()*360}deg)`, opacity: 1, offset: 0.35 },
      { transform: `translate(calc(-50% + ${dx*1.4}px), calc(-50% + ${dy*1.4}px)) scale(0.2) rotate(${Math.random()*540}deg)`, opacity: 0 }
    ], { duration: 700 + Math.random() * 300, easing: 'cubic-bezier(.2,.7,.4,1)' });
    setTimeout(() => p.remove(), 1100);
  }

  // shockwave ring
  const ring = document.createElement('div');
  ring.className = 'shockwave';
  ring.style.left = cx + 'px';
  ring.style.top  = cy + 'px';
  ring.style.borderColor = letter.color;
  playarea.appendChild(ring);
  setTimeout(() => ring.remove(), 600);
}
window.addEventListener('resize', () => {
  const playarea = document.getElementById('playarea');
  const rect = playarea.getBoundingClientRect();
  const size = Math.min(130, Math.max(92, window.innerWidth * 0.1625));
  letters.forEach(l => {
    l.size = size;
    l.x = Math.min(Math.max(0, l.x), rect.width - size);
    l.y = Math.min(Math.max(0, l.y), rect.height - size);
    l.el.style.width = size + 'px';
    l.el.style.height = size + 'px';
  });
});
